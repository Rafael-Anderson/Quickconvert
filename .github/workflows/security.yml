name: Security

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Audit, build, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # The app itself only requires Node 18.17+ (see README), but the
          # integration test suite (tests/integration.test.ts) relies on
          # --experimental-transform-types and --experimental-test-module-mocks,
          # which need a considerably newer Node than that. Pinned to what
          # was actually verified during development (v24.18.0), not the
          # app's own floor.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        id: audit
        run: |
          {
            echo "## npm audit"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Always print the full report (all severities) to the job log and
          # step summary, but only fail the build on high/critical findings
          # (--audit-level=high). Moderate/low findings are visible above but
          # don't block CI.
          set +e
          npm audit | tee -a "$GITHUB_STEP_SUMMARY"
          npm audit --audit-level=high
          audit_status=$?
          set -e

          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "$audit_status" -eq 0 ]; then
            echo "**Result: no high/critical vulnerabilities.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Result: high or critical vulnerabilities found — failing the build.**" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$audit_status"

      - name: Build
        id: build
        if: always() && steps.audit.outcome != 'cancelled'
        run: |
          echo "## Build" >> "$GITHUB_STEP_SUMMARY"
          if npm run build; then
            echo "**Result: build succeeded.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Result: build failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      # Beyond the original ask (audit + build) — runs the integration test
      # suite added alongside this workflow (tests/integration.test.ts). Left
      # in as a job summary section rather than a silent addition; see the
      # completion report for why.
      - name: Integration tests
        id: test
        if: always() && steps.audit.outcome != 'cancelled'
        run: |
          echo "## Integration tests" >> "$GITHUB_STEP_SUMMARY"
          if npm test; then
            echo "**Result: tests passed.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Result: tests failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
